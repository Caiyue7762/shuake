<!DOCTYPE html>
<html lang="zh-CN">
<head>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<meta charset="UTF-8">
<title>刷课神器 - AI视频笔记</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>
  .prose h2 { font-size: 1.3rem; font-weight: bold; margin-top: 1rem; }
.prose h3 { font-size: 1.1rem; font-weight: bold; margin-top: 0.8rem; }
.prose ul { list-style: disc; padding-left: 1.5rem; }
.prose ol { list-style: decimal; padding-left: 1.5rem; }
.prose strong { color: #7c3aed; }
.prose code { background: #eee; padding: 2px 6px; border-radius: 4px; }
  body { font-family: -apple-system, "PingFang SC", sans-serif; }
  .loading { animation: spin 1s linear infinite; }
  @keyframes spin { to { transform: rotate(360deg); } }
</style>
<script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
</head>
<body class="bg-gray-50">

<div class="max-w-5xl mx-auto p-6">
  <h1 class="text-3xl font-bold mb-2">📚 刷课神器</h1>
  <p class="text-gray-600 mb-6">粘贴B站链接，AI自动生成笔记+评论区重点</p>

  <!-- 登录区 -->
  <div id="authBox" class="bg-white p-4 rounded-lg shadow mb-6">
    <div id="loginForm">
      <input id="email" type="email" placeholder="邮箱" class="border p-2 rounded mr-2">
      <input id="password" type="password" placeholder="密码" class="border p-2 rounded mr-2">
      <button onclick="signUp()" class="bg-blue-500 text-white px-4 py-2 rounded">注册</button>
      <button onclick="signIn()" class="bg-green-500 text-white px-4 py-2 rounded">登录</button>
    </div>
    <div id="userInfo" class="hidden">
      已登录：<span id="userEmail"></span>
      <button onclick="signOut()" class="ml-4 text-red-500">退出</button>
    </div>
  </div>

  <!-- 输入区 -->
  <div class="bg-white p-6 rounded-lg shadow mb-6">
    <h2 class="text-xl font-bold mb-3">🎬 生成新笔记</h2>
    <input id="videoUrl" type="text" 
      placeholder="粘贴B站视频链接，如 https://www.bilibili.com/video/BV1xx" 
      class="w-full border p-3 rounded mb-3">
    <div class="flex gap-3 mb-3">
      <label><input type="checkbox" id="isPublic"> 公开到笔记库</label>
    </div>
    <button onclick="generateNote()" id="genBtn"
      class="bg-purple-600 text-white px-6 py-3 rounded font-bold">
      🚀 一键生成笔记
    </button>
    <div id="status" class="mt-3 text-gray-600"></div>
  </div>

  <!-- 搜索区 -->
  <div class="bg-white p-6 rounded-lg shadow mb-6">
    <h2 class="text-xl font-bold mb-3">🔍 搜索公共笔记库</h2>
    <input id="searchInput" type="text" placeholder="如：Python入门、考研数学..." 
      class="w-full border p-3 rounded mb-3">
    <button onclick="searchNotes()" class="bg-orange-500 text-white px-6 py-2 rounded">搜索</button>
    <div id="searchResults" class="mt-4 space-y-3"></div>
  </div>

  <!-- 我的笔记 -->
  <div class="bg-white p-6 rounded-lg shadow">
    <h2 class="text-xl font-bold mb-3">📒 我的笔记</h2>
    <div id="myNotes" class="space-y-3"></div>
  </div>
</div>

<!-- 笔记详情弹窗 -->
<div id="modal" class="hidden fixed inset-0 bg-black bg-opacity-50 flex items-center justify-center p-4">
  <div class="bg-white rounded-lg max-w-3xl w-full max-h-[90vh] overflow-auto p-6">
    <button onclick="document.getElementById('modal').classList.add('hidden')" 
      class="float-right text-2xl">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<script>
// ============ 配置区（你要改这里！） ============
const SUPABASE_URL = 'https://nmbbhmnkksficlyswlks.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5tYmJobW5ra3NmaWNseXN3bGtzIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY5MTYyMzgsImV4cCI6MjA5MjQ5MjIzOH0.CCfv8l1AOSmDNyRmhLC1yzTCBfDFd6FSDZ7vHhLKseU';
const AI_MODEL = 'deepseek-chat';
// ================================================

const { createClient } = window.supabase;
const db = createClient(SUPABASE_URL, SUPABASE_KEY);
let currentUser = null;

// 页面加载时检查登录状态
window.onload = async () => {
  const { data } = await db.auth.getSession();
  if (data.session) {
    currentUser = data.session.user;
    showUser();
    loadMyNotes();
  }
};

async function signUp() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const { error } = await db.auth.signUp({ email, password });
  if (error) alert('注册失败：' + error.message);
  else alert('注册成功！请查邮箱验证后登录');
}

async function signIn() {
  const email = document.getElementById('email').value;
  const password = document.getElementById('password').value;
  const { data, error } = await db.auth.signInWithPassword({ email, password });
  if (error) alert('登录失败：' + error.message);
  else {
    currentUser = data.user;
    showUser();
    loadMyNotes();
  }
}

async function signOut() {
  await db.auth.signOut();
  currentUser = null;
  document.getElementById('loginForm').classList.remove('hidden');
  document.getElementById('userInfo').classList.add('hidden');
  document.getElementById('myNotes').innerHTML = '';
}

function showUser() {
  document.getElementById('loginForm').classList.add('hidden');
  document.getElementById('userInfo').classList.remove('hidden');
  document.getElementById('userEmail').innerText = currentUser.email;
}

// ========== 核心功能：生成笔记 ==========
async function generateNote() {
  if (!currentUser) { alert('请先登录'); return; }
  const url = document.getElementById('videoUrl').value.trim();
  if (!url.includes('bilibili.com')) { alert('请输入B站链接'); return; }

  const btn = document.getElementById('genBtn');
  const status = document.getElementById('status');
  btn.disabled = true;
  btn.innerText = '⏳ 处理中...';

  try {
    // 1. 提取 BV 号
    const bvMatch = url.match(/BV[a-zA-Z0-9]+/);
    if (!bvMatch) throw new Error('链接里找不到BV号');
    const bvid = bvMatch[0];

    // 2. 获取视频信息
    status.innerText = '📡 获取视频信息...';
    const videoInfo = await getBiliVideoInfo(bvid);

    // 3. 获取字幕
    status.innerText = '📝 抓取视频字幕...';
    const subtitle = await getBiliSubtitle(bvid, videoInfo.cid);

    // 4. 获取评论
    status.innerText = '💬 抓取评论区...';
    const comments = await getBiliComments(videoInfo.aid);

    // 5. AI 总结
    status.innerText = '🤖 AI 正在生成笔记（可能需要30秒）...';
    const aiResult = await callAI(videoInfo.title, subtitle, comments);

    // 6. 存入 Supabase
    status.innerText = '💾 保存中...';
    const { error } = await db.from('notes').insert({
      user_id: currentUser.id,
      video_url: url,
      video_title: videoInfo.title,
      video_cover: videoInfo.pic,
      summary: aiResult.summary,
      comments_summary: aiResult.commentsSummary,
      mindmap: aiResult.mindmap,
      tags: aiResult.tags,
      category: aiResult.category,
      is_public: document.getElementById('isPublic').checked
    });

    if (error) throw error;
    status.innerText = '✅ 笔记生成完成！';
    loadMyNotes();
  } catch (e) {
    status.innerText = '❌ 失败：' + e.message;
  } finally {
    btn.disabled = false;
    btn.innerText = '🚀 一键生成笔记';
  }
}

// ========== B站 API 调用 ==========
// 注意：浏览器直接调B站API会有跨域问题，需要用代理
// 这里用一个公共代理（仅演示，生产环境请自建）



// ========== B站 API 调用（通过 Supabase Edge Function 代理）==========
async function callBiliProxy(payload) {
  const res = await fetch(`${SUPABASE_URL}/functions/v1/bili-proxy`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + SUPABASE_KEY
    },
    body: JSON.stringify(payload)
  });
  if (!res.ok) throw new Error('代理请求失败：' + res.status);
  return await res.json();
}

async function getBiliVideoInfo(bvid) {
  const json = await callBiliProxy({ action: 'info', bvid });
  if (json.code !== 0) throw new Error('视频信息获取失败：' + (json.message || '未知错误'));
  return {
    aid: json.data.aid,
    cid: json.data.cid,
    title: json.data.title,
    pic: json.data.pic,
    desc: json.data.desc
  };
}

async function getBiliSubtitle(bvid, cid) {
  try {
    const json = await callBiliProxy({ action: 'subtitle', bvid, cid });
    const subs = json.data?.subtitle?.subtitles;
    if (!subs || subs.length === 0) return '（该视频无字幕，AI将基于标题和评论总结）';
    const subUrl = subs[0].subtitle_url;
    const subJson = await callBiliProxy({ action: 'fetchSubtitle', url: subUrl });
    return subJson.body.map(b => b.content).join(' ');
  } catch (e) {
    return '（字幕抓取失败，AI将基于标题和评论总结）';
  }
}

async function getBiliComments(aid) {
  const json = await callBiliProxy({ action: 'comments', aid });
  if (!json.data?.replies) return [];
  return json.data.replies.map(r => ({
    content: r.content.message,
    likes: r.like
  }));
}


// ========== AI 调用 ==========
async function callAI(title, subtitle, comments) {
  const commentsText = comments.slice(0, 30)
    .map(c => `[${c.likes}赞] ${c.content}`).join('\n');

  const prompt = `你是一位资深学习导师 + 学科专家，擅长把视频内容提炼成"比原视频还好用"的深度学习笔记。

【视频标题】${title}
【视频完整字幕】${subtitle.slice(0, 30000)}
【评论区高赞】${commentsText}

请生成高质量深度笔记，严格返回 JSON（内容用 Markdown，summary 不少于 1500 字）：
{
  "summary": "## 一、核心结论\\n...\\n## 二、知识体系\\n每点含：是什么/为什么/怎么用/易错点\\n## 三、关键点深度解析\\n挑 3-5 个重点，每个 200+ 字\\n## 四、知识联系\\n## 五、可行建议\\n学习路径/实操练习/避坑/延伸资料",
  "commentsSummary": "## 📌 评论区高赞观点\\n## ⚠️ 常见疑问\\n## 💡 补充经验",
  "mindmap": "至少 4 层的 Markdown 思维导图",
  "tags": ["5个精准标签"],
  "category": "主分类"
}
要求：不复读原话、给例子数字代码、建议要具体到今天能做什么。`;

  const res = await fetch(`${SUPABASE_URL}/functions/v1/bili-proxy`, {
    method: 'POST',
    headers: {
      'Content-Type': 'application/json',
      'Authorization': 'Bearer ' + SUPABASE_KEY
    },
    body: JSON.stringify({
      action: 'ai',
      body: {
        model: AI_MODEL,
        messages: [{ role: 'user', content: prompt }],
        response_format: { type: 'json_object' },
        temperature: 0.3,
        max_tokens: 8000
      }
    })
  });
  const json = await res.json();
  if (!json.choices) throw new Error('AI返回异常：' + JSON.stringify(json));
  return JSON.parse(json.choices[0].message.content);
}

async function exportNote(type) {
  const el = document.getElementById('exportArea');
  if (!el) { alert('找不到笔记内容'); return; }

  // 隐藏按钮（截图时不要按钮入镜）
  const btns = el.querySelectorAll('button');
  btns.forEach(b => b.style.visibility = 'hidden');

  try {
    const canvas = await html2canvas(el, {
      scale: 2,                  // 高清
      backgroundColor: '#ffffff',
      useCORS: true,
      logging: false
    });

    const fileName = '笔记_' + new Date().toISOString().slice(0,10);

    if (type === 'png') {
      const link = document.createElement('a');
      link.download = fileName + '.png';
      link.href = canvas.toDataURL('image/png');
      link.click();
    } else {
      const { jsPDF } = window.jspdf;
      const imgData = canvas.toDataURL('image/png');
      const pdf = new jsPDF('p', 'mm', 'a4');
      const pageW = 210;
      const pageH = 297;
      const imgW = pageW;
      const imgH = canvas.height * imgW / canvas.width;

      let heightLeft = imgH;
      let position = 0;

      pdf.addImage(imgData, 'PNG', 0, position, imgW, imgH);
      heightLeft -= pageH;

      // 内容超过一页时分页
      while (heightLeft > 0) {
        position = heightLeft - imgH;
        pdf.addPage();
        pdf.addImage(imgData, 'PNG', 0, position, imgW, imgH);
        heightLeft -= pageH;
      }

      pdf.save(fileName + '.pdf');
    }
  } catch (err) {
    alert('导出失败：' + err.message);
  } finally {
    btns.forEach(b => b.style.visibility = 'visible');
  }
}


// ========== 加载笔记 ==========
async function loadMyNotes() {
  if (!currentUser) return;
  const { data } = await db.from('notes')
    .select('*').eq('user_id', currentUser.id)
    .order('created_at', { ascending: false });
  renderNotes(data || [], 'myNotes');
}

async function searchNotes() {
  const q = document.getElementById('searchInput').value.trim();
  let query = db.from('notes').select('*').eq('is_public', true);
  if (q) {
    // 标题、分类、标签三路搜索
    query = query.or(`video_title.ilike.%${q}%,category.ilike.%${q}%,tags.cs.{${q}}`);
  }
  const { data, error } = await query
    .order('view_count', { ascending: false })
    .order('created_at', { ascending: false })
    .limit(30);
  if (error) console.error(error);
  renderNotes(data || [], 'searchResults');
}

function renderNotes(notes, targetId) {
  const html = notes.map(n => `
    <div class="border p-3 rounded hover:bg-gray-50 cursor-pointer" onclick='showNote(${JSON.stringify(n).replace(/'/g, "&#39;")})'>
      <div class="flex gap-3">
        ${n.video_cover ? `<img src="${n.video_cover}" class="w-32 h-20 object-cover rounded">` : ''}
        <div class="flex-1">
          <h3 class="font-bold">${n.video_title || '无标题'}</h3>
          <div class="text-sm text-gray-500 mt-1">
            ${(n.tags || []).map(t => `<span class="bg-blue-100 text-blue-700 px-2 py-0.5 rounded mr-1">${t}</span>`).join('')}
          </div>
          <div class="text-xs text-gray-400 mt-1">${n.is_public ? '🌐 公开' : '🔒 私密'} · ${new Date(n.created_at).toLocaleDateString()}</div>
        </div>
      </div>
    </div>
  `).join('');
  document.getElementById(targetId).innerHTML = html || '<p class="text-gray-400">暂无笔记</p>';
}

function showNote(n) {
  db.from('notes').update({ view_count: (n.view_count||0) + 1 }).eq('id', n.id).then();
  const md = (text) => marked.parse(text || '');
  document.getElementById('modalContent').innerHTML = `
    <div style="margin-bottom:12px; text-align:right;">
      <button onclick="exportNote('png')" 
        style="background:#10b981;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;margin-right:8px;">
        📷 导出 PNG
      </button>
      <button onclick="exportNote('pdf')" 
        style="background:#3b82f6;color:#fff;border:none;padding:8px 16px;border-radius:6px;cursor:pointer;">
        📄 导出 PDF
      </button>
    </div>

    <div id="exportArea" style="background:#fff; padding:20px;">
      <h2 class="text-2xl font-bold mb-2">${n.video_title}</h2>
      <a href="${n.video_url}" target="_blank" class="text-blue-500 text-sm">🔗 原视频</a>
      <div class="prose max-w-none mt-4">
        <h3 class="text-lg font-bold mt-4 border-l-4 border-purple-500 pl-2">📖 深度笔记</h3>
        <div class="bg-gray-50 p-4 rounded">${md(n.summary)}</div>
        <h3 class="text-lg font-bold mt-4 border-l-4 border-yellow-500 pl-2">💬 评论区精华</h3>
        <div class="bg-yellow-50 p-4 rounded">${md(n.comments_summary)}</div>
        <h3 class="text-lg font-bold mt-4 border-l-4 border-green-500 pl-2">🧠 思维导图</h3>
        <div class="bg-green-50 p-4 rounded">${md(n.mindmap)}</div>
      </div>
    </div>
  `;
  document.getElementById('modal').classList.remove('hidden');
}

</script>
</body>
</html>
